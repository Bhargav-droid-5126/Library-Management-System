<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <title>User Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="js/config.js"></script>

</head>

<body class="dashboard-page">


    <div class="container">

        <h1 id="welcome">👋 Welcome</h1>

        <p style="color:#6b7280;font-size:18px;margin-bottom:35px;">
            Choose an option below.
        </p>

        <div class="dashboard">

            <div class="card" onclick="window.location.href='home.html'">

                <div class="icon"><i class="fa-solid fa-book"></i>
                </div>

                <h2>Browse Books</h2>

                <p>Search and borrow books.</p>

            </div>

            <div class="card" onclick="window.location.href='my_books.html'">

                <div class="icon"><i class="fa-solid fa-book-open"></i>
                </div>

                <h2>My Books</h2>

                <p>View borrowed books.</p>

            </div>

            <div class="card" onclick="window.location.href='profile.html'">

                <div class="icon"><i class="fa-solid fa-user"></i></div>

                <h2>Profile</h2>

                <p>Manage your account.</p>

            </div>

            <div class="card" onclick="logout()">

                <div class="icon"><i class="fa-solid fa-right-from-bracket"></i></div>

                <h2>Logout</h2>

                <p>Sign out safely.</p>

            </div>

        </div>

    </div>

    <script>

        let name = localStorage.getItem("member_name");

        if (name) {

            document.getElementById("welcome").innerHTML = "<i class='fa-solid fa-hand'></i> Welcome, " + name;

        }

        function logout() {

            localStorage.clear();

            window.location.href = "index.html";

        }

    </script>

</body>
<footer>

    <p>

        © 2026 Library Management System | Developed by Bhargav

    </p>

</footer>

</html>
