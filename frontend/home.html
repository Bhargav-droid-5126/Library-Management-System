<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <title>Library</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>

</head>

<body class="dashboard-page">
    <header>

        <div class="logo">

            <i class="fa-solid fa-book"></i> Library Management System

        </div>

        <nav>

            <a href="user.html">Dashboard</a>

            <a href="home.html">Home</a>

            <a href="my_books.html">My Books</a>

            <a href="profile.html">Profile</a>

            <a href="index.html">Logout</a>

        </nav>

    </header>

    <div class="container">

        <h1><i class="fa-solid fa-book"></i> Library Collection</h1>

        <p style="color:#6b7280;font-size:18px;margin-bottom:25px;">
            Search, borrow and discover books.
        </p>

        <input type="text" id="search" oninput="searchBooks()" placeholder="Search Books...">

        <br><br>

        <h2>Available Books</h2>

        <div id="loading" class="loading">

            <div class="spinner"></div>

            <p>Loading books...</p>

        </div>

        <div class="books" id="books">

        </div>

        <div id="recommendationSection" style="display:none;">

            <h2 style="margin-top:50px;">⭐ You May Also Like</h2>

            <div id="rec-loading" class="loading">

                <div class="spinner"></div>

                <p>Loading recommendations...</p>

            </div>

            <div class="books" id="recommendations">

            </div>

        </div>

        <br><br>

        <a href="user.html">

            ← Back to Dashboard

        </a>

    </div>

    <script src="js/home.js"></script>

</body>
<footer>

    <p>

        © 2026 Library Management System | Developed by Bhargav

    </p>

</footer>

</html>
